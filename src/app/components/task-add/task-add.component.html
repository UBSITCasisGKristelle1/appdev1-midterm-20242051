<div class="row justify-content-center">
  <div class="col-lg-7 col-md-9">

    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0 fw-bold">➕ Add New Task</h4>
      </div>

      <div class="card-body">
        <form (ngSubmit)="submit()" #taskForm="ngForm">

        
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              Title <span class="text-danger">*</span>
            </label>
            <input
              id="title"
              name="title"
              type="text"
              class="form-control"
              placeholder="Enter task title"
              [(ngModel)]="task.title"
              required />
          </div>

       
          <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea
              id="description"
              name="description"
              class="form-control"
              rows="3"
              placeholder="Enter task description"
              [(ngModel)]="task.description">
            </textarea>
          </div>

      
          <div class="mb-3">
            <label for="dueDate" class="form-label fw-semibold">Due Date</label>
            <input
              id="dueDate"
              name="dueDate"
              type="date"
              class="form-control"
              [(ngModel)]="task.dueDate" />
          </div>

      
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="status" class="form-label fw-semibold">Status</label>
              <select id="status" name="status" class="form-select" [(ngModel)]="task.status">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="priority" class="form-label fw-semibold">Priority</label>
              <select id="priority" name="priority" class="form-select" [(ngModel)]="task.priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>
          </div>

   
          <div class="d-flex gap-2 pt-2">
            <button
              type="submit"
              class="btn btn-success"
              [disabled]="!task.title">
              ✓ Add Task
            </button>
            <a routerLink="/tasks" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
