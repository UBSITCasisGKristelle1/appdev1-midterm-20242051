
<div *ngIf="task; else notFound">

  <h4 class="fw-bold mb-4">✏️ Edit Task</h4>

  <form (ngSubmit)="update()" #editForm="ngForm">


    <div class="mb-3">
      <label for="editTitle" class="form-label fw-semibold">
        Title <span class="text-danger">*</span>
      </label>
      <input
        id="editTitle"
        name="title"
        type="text"
        class="form-control"
        [(ngModel)]="task.title"
        required />
    </div>


    <div class="mb-3">
      <label for="editDescription" class="form-label fw-semibold">Description</label>
      <textarea
        id="editDescription"
        name="description"
        class="form-control"
        rows="3"
        [(ngModel)]="task.description">
      </textarea>
    </div>


    <div class="mb-3">
      <label for="editDueDate" class="form-label fw-semibold">Due Date</label>
      <input
        id="editDueDate"
        name="dueDate"
        type="date"
        class="form-control"
        [(ngModel)]="task.dueDate" />
    </div>

    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="editStatus" class="form-label fw-semibold">Status</label>
        <select id="editStatus" name="status" class="form-select" [(ngModel)]="task.status">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label for="editPriority" class="form-label fw-semibold">Priority</label>
        <select id="editPriority" name="priority" class="form-select" [(ngModel)]="task.priority">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
    </div>

    <div class="d-flex gap-2 pt-2">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="!task.title">
        💾 Save Changes
      </button>
      <a routerLink="/tasks" class="btn btn-outline-secondary">Cancel</a>
    </div>

  </form>
</div>


<ng-template #notFound>
  <div class="alert alert-warning mb-0">
    ⚠️ Task not found.
    <a routerLink="/tasks" class="alert-link">Return to task list</a>.
  </div>
</ng-template>
