
<div *ngIf="task; else notFound">


  <h3 class="fw-bold mb-4">{{ task.title }}</h3>

  <div class="row g-3">

  
    <div class="col-sm-6">
      <p class="text-muted small mb-1">Status</p>
      <span
        class="badge rounded-pill fs-6"
        [ngClass]="{
          'bg-warning text-dark': task.status === 'Pending',
          'bg-primary'          : task.status === 'In Progress',
          'bg-success'          : task.status === 'Completed'
        }">
        {{ task.status }}
      </span>
    </div>

    <div class="col-sm-6">
      <p class="text-muted small mb-1">Priority</p>
      <span
        class="badge fs-6"
        [ngClass]="{
          'bg-danger'           : task.priority === 'High',
          'bg-warning text-dark': task.priority === 'Medium',
          'bg-secondary'        : task.priority === 'Low'
        }">
        {{ task.priority }}
      </span>
    </div>

  
    <div class="col-sm-6">
      <p class="text-muted small mb-1">Due Date</p>
      <p class="fw-semibold mb-0">{{ task.dueDate || '—' }}</p>
    </div>


    <div class="col-sm-6">
      <p class="text-muted small mb-1">Task ID</p>
      <p class="fw-semibold mb-0 text-muted">#{{ task.id }}</p>
    </div>

   
    <div class="col-12">
      <hr class="my-2" />
      <p class="text-muted small mb-1">Description</p>
      <p class="mb-0">{{ task.description || 'No description provided.' }}</p>
    </div>

  </div>
</div>


<ng-template #notFound>
  <div class="alert alert-warning mb-0">
    ⚠️ Task not found.
    <a routerLink="/tasks" class="alert-link">Return to task list</a>.
  </div>
</ng-template>
